skip_rules:

  - trigger_column: "workplace"
    trigger_value: "NHS or local healthcare service"
    skip_columns: [
      "cs_grade", "department", "department_other", "prof_DE", "prof_DS",
      "prof_GDD", "prof_GAD", "prof_GES", "prof_geog", "prof_GORS", "prof_GSE",
      "prof_GSR", "prof_GSG", "prof_none", "prof_other", "ons_directorate"]
    condition: "equals"

  - trigger_column: "workplace"
    trigger_value: "Civil service, including devolved administrations"
    skip_columns: ["pay_band", "nhs_band", "njc_grade"]
    condition: "equals"

  - trigger_column: "workplace"
    trigger_value: [
      "Civil service, including devolved administrations",
      "NHS or local healthcare service"]
    skip_columns: [
      "cs_grade", "department", "department_other", "prof_DE", "prof_DS",
      "prof_GDD", "prof_GAD", "prof_GES", "prof_geog", "prof_GORS", "prof_GSE",
      "prof_GSR", "prof_GSG", "prof_none", "prof_other", "ons_directorate",
      "pay_band", "nhs_band", "njc_grade"]
    condition: "not_in"

  - trigger_column: "department"
    trigger_value: "Office for National Statistics"
    skip_columns: ["ons_directorate"]
    condition: "not_equals"

  - trigger_column: "ons_directorate"
    trigger_value: "test"
    skip_columns: ["pay_band", "nhs_band", "njc_grade"]
    condition: "not_equals"

  - trigger_column: "pay_band"
    trigger_value: ["Local Authority or NJC", "Other / Not sure", "test"]
    skip_columns: ["nhs_band"]
    condition: "in"

  - trigger_column: "pay_band"
    trigger_value: ["NHS", "Other / Not sure", "test"]
    skip_columns: ["njc_grade"]
    condition: "in"

  - trigger_column: "coding_exp"
    trigger_value: "Yes"
    skip_columns: [
      "coding_learn_pref", "learn_avail_resource", "learn_suit_resources",
      "learn_opportunity", "learn_tools", "learn_manager_support",
      "learn_peer_support", "learn_no_barrier", "learn_other_barrier"]
    condition: "equals"

  - trigger_column: "coding_exp"
    trigger_value: "No"
    skip_columns: [
      "coding_years", "code_freq", "coding_freq_pref", "ability_change",
      "standards", "duck_book"]
    condition: "equals"

  - trigger_column: "code_freq"
    trigger_value: "Never"
    skip_columns: [
      "cloud_none", "cloud_other", "ai", "ai_gpt", "ai_github", "ai_google",
      "ai_microsoft", "ai_claude", "ai_codex", "ai_other", "ai_use_write",
      "ai_use_debug", "ai_use_doc", "ai_use_testing", "ai_use_question",
      "ai_use_learn", "ai_impact", "prac_open_source", "prac_code_style",
      "prac_functions", "prac_control_flow", "prac_config", "prac_review",
      "prac_manual_tests", "prac_auto_tests", "work_git", "work_succession",
      "work_aims"]
    condition: "equals"

  - trigger_column: "ai"
    trigger_value: "No"
    skip_columns: [
      "ai_gpt", "ai_github", "ai_google", "ai_microsoft", "ai_claude",
      "ai_codex", "ai_other", "ai_use_write", "ai_use_debug", "ai_use_doc",
      "ai_use_testing", "ai_use_question", "ai_use_learn", "ai_impact"]
    condition: "equals"

  - trigger_column: "packages"
    trigger_value: "Yes"
    skip_columns: ["packages_list"]
    condition: "not_equals"
